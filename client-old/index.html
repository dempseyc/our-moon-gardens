<!doctype html>
<html>
  <head>
    <style>
      body { font-family: monospace; background: #111; color: #eee; }
      #sticker-picker { height: 64px;display: flex; gap: 10px; padding: 20px; flex-wrap: wrap; }
      .sticker-thumb { width: 64px; height: 64px; border: 2px solid #333; cursor: pointer; }
      .sticker-thumb.selected { border-color: #0f0; }
      #plot { 
        width: 500px; height: 500px; 
        border: 2px solid #444; 
        position: relative; 
        background: #222;
        margin: 20px;
      }
      .placed-sticker { position: absolute; width: 32px; height: 32px; }
    </style>
  </head>
  <body>
    <h1>🌙 Our Moon Gardens</h1>
    
    <h2>Choose a Sticker</h2>
    <div id="sticker-picker"></div>
    
    <h2>Plot 0 (click to place)</h2>
    <div id="plot"></div>

    <pre id="log"></pre>

    <script src="client.js"></script>
  </body>
</html>
